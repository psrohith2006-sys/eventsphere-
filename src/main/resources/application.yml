server:
  port: 8080

spring:
  application:
    name: eventsphere-backend

  datasource:
    url: jdbc:mysql://localhost:3306/eventsphere?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

app:
  jwt:
    secret: ${JWT_SECRET:eventsphere-super-secret-key-change-me-in-production-0123456789}
    expiration-ms: 86400000 # 24 hours

  cors:
    allowed-origins: http://localhost:5173
